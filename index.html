<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecommerce Test</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{display:flex;flex-wrap:wrap;gap:20px;padding:20px;justify-content:center}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);width:200px;padding:15px;text-align:center}
.card img{width:100%;border-radius:8px}
button{background:#111;color:#fff;border:none;padding:10px 15px;margin-top:10px;cursor:pointer;border-radius:5px}
button:hover{background:#444}
#cart{position:fixed;top:0;right:0;background:#fff;width:250px;height:100%;box-shadow:-2px 0 5px rgba(0,0,0,0.2);padding:15px;overflow:auto}
h3{margin-top:0}
.item{border-bottom:1px solid #ddd;padding:5px 0}
.total{font-weight:bold;margin-top:10px}
</style>
</head>
<body>

<header>
<h1>Store</h1>
</header>

<div class="container" id="products"></div>

<div id="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<div class="total" id="total">Total: ₹0</div>
</div>

<script>
const products=[
{id:1,name:"Product A",price:500,img:"https://via.placeholder.com/200"},
{id:2,name:"Product B",price:700,img:"https://via.placeholder.com/200"},
{id:3,name:"Product C",price:900,img:"https://via.placeholder.com/200"}
];

const cart=[];

function renderProducts(){
const container=document.getElementById("products");
products.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<img src="${p.img}"><h4>${p.name}</h4><p>₹${p.price}</p><button onclick="addToCart(${p.id})">Add to Cart</button>`;
container.appendChild(div);
});
}

function addToCart(id){
const product=products.find(p=>p.id===id);
cart.push(product);
updateCart();
gtag('event','add_to_cart',{currency:'INR',value:product.price,items:[{item_id:product.id,item_name:product.name}]});
}

function updateCart(){
const cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";
let total=0;
cart.forEach(item=>{
total+=item.price;
const div=document.createElement("div");
div.className="item";
div.innerText=item.name+" - ₹"+item.price;
cartItems.appendChild(div);
});
document.getElementById("total").innerText="Total: ₹"+total;
}

renderProducts();
</script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-XXXXXXXXXX');
</script>

</body>
</html>
